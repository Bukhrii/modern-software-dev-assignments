kind = "web"
previewPath = "/"
title = "Shared Task Board"
version = "1.0.0"
id = "artifacts/task-board"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18628
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/task-board run dev"

[services.env]
PORT = "18628"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/task-board", "run", "build"]
publicDir = "artifacts/task-board/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
